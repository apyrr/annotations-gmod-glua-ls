name: release-test
on:
  workflow_dispatch:
  push:
    branches:
      #- main
      - test-plugin
    # Only trigger on changes that actually impact our final output
    paths:
      - 'src/**'
      - 'custom/**'
      - '__tests__/**'
      - 'package.json'
      - 'package-lock.json'
      - 'yarn.lock'
      - 'jest.config.ts'
      - 'tsconfig.json'

jobs:
  release:
    permissions: write-all
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v3
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Scrape wiki
        run: npm run scrape-wiki
      - name: Run tests
        run: npm test
      - name: Format the output with StyLua
        uses: JohnnyMorganz/stylua-action@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: latest
          args: --no-editorconfig output/
      - name: Publish annotations to test branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stash only the final .lua files + metadata to a temp dir before switching branches.
          # This is necessary because `git rm -rf .` only removes tracked files; output/ is
          # gitignored (untracked) so it survives, causing duplicates when git add -A picks it up.
          tmpdir=$(mktemp -d)
          find output/ -maxdepth 1 -type f -name '*.lua' -exec cp {} "$tmpdir/" \;
          cp output/__metadata.json "$tmpdir/"

          # Create orphan branch, then wipe EVERYTHING (tracked + untracked + ignored)
          branchName="emmylua-annotations-test"
          git checkout --orphan "$branchName"
          git rm -rf .
          git clean -fdx

          # Restore only the final annotation files
          cp "$tmpdir/"*.lua .
          cp "$tmpdir/__metadata.json" .
          git add -A

          # Commit with timestamp and branch reference
          commitMsg="Update EmmyLua annotations (test) - $(date -u +%Y-%m-%dT%H:%M:%SZ) - from ${{ github.ref_name }}"
          git commit -m "$commitMsg"

          # Force push to publish
          git push -f origin "$branchName"
