name: release
on:
  workflow_dispatch:
  push:
    branches:
      - emmylua-gmod
  schedule:
    - cron: "0 0 1 * *"
jobs:
  release:
    permissions: write-all
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v3
        with:
          node-version: "22"
      - name: Install dependencies
        run: npm ci
      - name: Check if there have been changes to the wiki
        id: wiki_confirm_no_changes
        continue-on-error: true
        run: |
          if [ "$RUNNER_DEBUG" = "1" ]; then
            exit 1
          else
            npm run wiki-check-changed $(git tag -l --sort=-v:refname)
          fi
      - name: Scrape wiki
        if: ${{ steps.wiki_confirm_no_changes.outcome == 'failure' }}
        run: npm run scrape-wiki
      - name: Run tests
        if: ${{ steps.wiki_confirm_no_changes.outcome == 'failure' }}
        run: npm test
      - name: Format the output with StyLua
        if: ${{ steps.wiki_confirm_no_changes.outcome == 'failure' }}
        uses: JohnnyMorganz/stylua-action@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: latest
          args: --no-editorconfig output/
      - name: Tag latest scrape revision
        if: ${{ steps.wiki_confirm_no_changes.outcome == 'failure' }}
        run: |
          tag=$(node -e "const fs=require('fs'); const metadata=JSON.parse(fs.readFileSync('output/__metadata.json','utf8')); const tagName=new Date(metadata.lastUpdate).toISOString().replace(/:/g,'-').slice(0,-5).replace('T','_'); process.stdout.write(tagName);")
          if git rev-parse -q --verify "refs/tags/$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists."
          else
            git tag "$tag"
            git push origin "refs/tags/$tag"
          fi
      - name: Publish annotations to branch
        if: ${{ steps.wiki_confirm_no_changes.outcome == 'failure' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Create orphan branch with output/ contents
          git checkout --orphan emmylua-annotations
          git rm -rf .
          cp -r output/* .
          git add -A
          
          # Commit with timestamp
          commitMsg="Update EmmyLua annotations - $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git commit -m "$commitMsg"
          
          # Force push to publish
          git push -f origin emmylua-annotations
